<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель управления</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 {
            color: #1db954;
            margin-top: 40px;
        }

        p {
            color: #aaaaaa;
            margin-bottom: 40px;
        }

        .container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin: 0 auto;
        }

        .card {
            background-color: #242424;
            padding: 20px;
            border-radius: 8px;
            width: 250px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        .card h3 {
            margin-top: 0;
            color: #ffffff;
        }

        .card p {
            font-size: 14px;
            color: #888888;
            margin-bottom: 20px;
            height: 40px;
        }

        .btn {
            display: inline-block;
            background-color: #1db954;
            color: #ffffff;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 4px;
            font-weight: bold;
        }

        .btn:hover {
            background-color: #1aa34a;
        }
    </style>
</head>
<body>

    <h1>Музыкальный проект</h1>
    <p>Локальная панель управления файлами и скриптами</p>

    <div class="container">

        <!-- Кнопка для папки песен -->
        <div class="card">
            <h3>Песни</h3>
            <p>Перейти к аудиофайлам в папке songs</p>
            <a href="songs/" class="btn">Открыть</a>
        </div>

        <!-- Кнопка для Lua скрипта -->
        <div class="card">
            <h3>Скрипт Lua</h3>
            <p>Просмотр настроек файла atoolsW.lua</p>
            <a href="atoolsW.lua" class="btn">Открыть</a>
        </div>

        <!-- Кнопка для JSON данных -->
        <div class="card">
            <h3>Информация</h3>
            <p>Просмотр данных из info.json</p>
            <a href="info.json" class="btn">Открыть</a>
        </div>

    </div>

</body>
</html>
